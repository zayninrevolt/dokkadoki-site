baseURL = "https://dokkadoki.co.uk/"
locale = "en-GB"
title = "Dokkadoki - Manga Café & Reading Room · Bury"

disableKinds = ["taxonomy", "term"]

# Pretty URLs like /blog/my-post/
[permalinks]
  blog = "/blog/:slug/"

[params]
  description = "Dokkadoki is a manga café and reading room coming soon to The Millgate, Bury. A cosy corner for reading, a proper coffee, and a little Japanese escape."
  ebayURL = "https://www.ebay.co.uk/usr/dokkadoki"
  libibURL = "https://www.libib.com/u/dokkadoki"
  instagramURL = "https://www.instagram.com/dokkadoki/"
  tiktokURL = "https://www.tiktok.com/@dokkadoki"
  discordURL = "https://discord.gg/zjutK2TTHv"
  contactEmail = "admin@dokkadoki.co.uk"
  # Analytics are deliberately disabled. If this changes, update the privacy
  # notice before enabling an analytics script.
  goatcounter = ""
  # Port exposed by the dokkadoki-api container for local/LAN previews.
  apiDevPort = 3456
  # Public API stays on Unraid behind its own Cloudflare Tunnel hostname.
  apiURL = "https://api.dokkadoki.co.uk"
  appStoreURL = "https://apps.apple.com/gb/app/neko-catch-dokkadoki/id6788832200"

[caches.images]
  dir = ":cacheDir/images"

[markup.goldmark.renderer]
  unsafe = true # allow raw HTML in markdown posts (embeds, iframes)
