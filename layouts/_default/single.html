{{ define "main" }}
<article class="wrap post">
  <header class="post-header">
    <p class="kana">ブログ</p>
    <h1 class="post-title">{{ .Title }}</h1>
    {{ if not .Date.IsZero }}
    <p class="post-meta"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time></p>
    {{ end }}
  </header>

  <div class="post-body card">
    {{ .Content }}
  </div>

  <p class="all-posts"><a href="{{ "/blog/" | relURL }}">← Back to all posts</a></p>
</article>
{{ end }}
